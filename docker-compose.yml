# InteractiveStreams – Docker Compose
# Usage:  docker compose up [-d]
# Rebuild: docker compose up --build
#
# Coolify: Select this file as "Docker Compose" source.
#          See docs/COOLIFY.md for the full setup guide.

services:
  app:
    build:
      context: .
      args:
        GIT_COMMIT_HASH: ${GIT_COMMIT_HASH:-}
        SOURCE_COMMIT: ${SOURCE_COMMIT:-}
        COOLIFY_GIT_COMMIT_SHA: ${COOLIFY_GIT_COMMIT_SHA:-}
        COMMIT_SHA: ${COMMIT_SHA:-}
        GITHUB_SHA: ${GITHUB_SHA:-}
    container_name: interactive-streams
    # No ports: mapping – Coolify's Traefik reverse proxy handles routing
    # based on the EXPOSE 8080 in the Dockerfile and the configured FQDN.
    # For local docker compose usage outside Coolify, uncomment the line below:
    # ports:
    #   - "8080:8080"
    volumes:
      - streams-data:/home/streams/app/data          # SQLite databases (persistent)
      - streams-audio:/home/streams/app/audio        # External audio files (music + SFX)
    environment:
      - DISPLAY=:99
      - GIT_COMMIT_HASH=${GIT_COMMIT_HASH:-}
      - SOURCE_COMMIT=${SOURCE_COMMIT:-}
      - COOLIFY_GIT_COMMIT_SHA=${COOLIFY_GIT_COMMIT_SHA:-}
      - COMMIT_SHA=${COMMIT_SHA:-}
      - GITHUB_SHA=${GITHUB_SHA:-}
      - LIBGL_ALWAYS_SOFTWARE=1   # Force Mesa software renderer (no GPU in container)
      - GALLIUM_DRIVER=llvmpipe   # Use llvmpipe software rasterizer explicitly
    restart: unless-stopped

volumes:
  streams-data:
    driver: local
  streams-audio:
    driver: local
