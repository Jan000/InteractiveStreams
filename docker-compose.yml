# InteractiveStreams – Docker Compose
# Usage:  docker compose up [-d]
# Rebuild: docker compose up --build
#
# Coolify: Select this file as "Docker Compose" source.
#          See docs/COOLIFY.md for the full setup guide.

services:
  app:
    build: .
    container_name: interactive-streams
    # No ports: mapping – Coolify's Traefik reverse proxy handles routing
    # based on the EXPOSE 8080 in the Dockerfile and the configured FQDN.
    # For local docker compose usage outside Coolify, uncomment the line below:
    # ports:
    #   - "8080:8080"
    volumes:
      - streams-data:/home/streams/app/data          # SQLite databases (persistent)
    environment:
      - DISPLAY=:99
    restart: unless-stopped

volumes:
  streams-data:
    driver: local
