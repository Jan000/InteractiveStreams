# InteractiveStreams – CI Pipeline
# Builds on Ubuntu and Windows, runs unit tests, builds the web dashboard.
#
# Caching strategy:
#   - Bun: ~/.bun/install/cache (keyed on bun.lock)
#   - FetchContent: build/_deps (keyed on CMakeLists.txt hash)
#   - ccache: ~/.ccache (keyed on OS + compiler, restored across builds)
#   - Docker: BuildKit inline cache via GHCR

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # FetchContent cache key – changes when dependencies change
  FETCHCONTENT_CACHE_KEY: fc-${{ hashFiles('CMakeLists.txt') }}

jobs:
  # ── Web Dashboard Build ──────────────────────────────────────────────────
  dashboard:
    name: Dashboard (Bun)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache bun packages
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('web/bun.lock', 'web/package.json') }}
          restore-keys: bun-
      - name: Install dependencies
        working-directory: web
        run: bun install --frozen-lockfile
      - name: Lint
        working-directory: web
        run: bun run lint || true
      - name: Build static export
        working-directory: web
        run: bun run build
      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard
          path: web/out/

  # ── C++ Build & Test (Linux) ─────────────────────────────────────────────
  build-linux:
    name: C++ (Ubuntu)
    runs-on: ubuntu-latest
    needs: dashboard
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake git ccache \
            libx11-dev libxrandr-dev libxcursor-dev libxi-dev \
            libudev-dev libgl1-mesa-dev libfreetype-dev \
            libssl-dev \
            xvfb
      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: ${{ env.FETCHCONTENT_CACHE_KEY }}-linux
          restore-keys: fc--linux
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-linux-${{ github.sha }}
          restore-keys: ccache-linux-
      - name: Configure ccache
        run: |
          ccache --set-config=max_size=500M
          ccache --set-config=compression=true
          ccache -z
      - name: Download dashboard artifact
        uses: actions/download-artifact@v4
        with:
          name: dashboard
          path: web/out/
      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DIS_BUILD_TESTS=ON \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
      - name: Build
        run: cmake --build build --config Release -j$(nproc)
      - name: ccache stats
        run: ccache -s
      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure

  # ── C++ Build & Test (Windows / MSVC) ───────────────────────────────────
  build-windows:
    name: C++ (Windows)
    runs-on: windows-latest
    needs: dashboard
    steps:
      - uses: actions/checkout@v4
      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: ${{ env.FETCHCONTENT_CACHE_KEY }}-windows
          restore-keys: fc--windows
      - name: Download dashboard artifact
        uses: actions/download-artifact@v4
        with:
          name: dashboard
          path: web/out/
      - name: Configure CMake
        run: cmake -B build -DIS_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build --config Release
      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure -C Release

  # ── Docker Build ─────────────────────────────────────────────────────────
  docker:
    name: Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image (with BuildKit cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: interactive-streams:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
