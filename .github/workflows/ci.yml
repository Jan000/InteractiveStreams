# InteractiveStreams – CI Pipeline
# Builds on Ubuntu and Windows, runs unit tests, builds the web dashboard.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Web Dashboard Build ──────────────────────────────────────────────────
  dashboard:
    name: Dashboard (Bun)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        working-directory: web
        run: bun install --frozen-lockfile
      - name: Lint
        working-directory: web
        run: bun run lint || true
      - name: Build static export
        working-directory: web
        run: bun run build
      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard
          path: web/out/

  # ── C++ Build & Test (Linux) ─────────────────────────────────────────────
  build-linux:
    name: C++ (Ubuntu)
    runs-on: ubuntu-latest
    needs: dashboard
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake git \
            libx11-dev libxrandr-dev libxcursor-dev libxi-dev \
            libudev-dev libgl1-mesa-dev libfreetype-dev \
            xvfb
      - name: Download dashboard artifact
        uses: actions/download-artifact@v4
        with:
          name: dashboard
          path: web/out/
      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DIS_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build --config Release -j$(nproc)
      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure

  # ── C++ Build & Test (Windows / MSVC) ───────────────────────────────────
  build-windows:
    name: C++ (Windows)
    runs-on: windows-latest
    needs: dashboard
    steps:
      - uses: actions/checkout@v4
      - name: Download dashboard artifact
        uses: actions/download-artifact@v4
        with:
          name: dashboard
          path: web/out/
      - name: Configure CMake
        run: cmake -B build -DIS_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build --config Release
      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure -C Release

  # ── Docker Build ─────────────────────────────────────────────────────────
  docker:
    name: Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t interactive-streams:ci .
